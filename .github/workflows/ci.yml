name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: Typecheck, Test & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build extension
        run: npm run compile

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package extension
        run: npx vsce package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: continue-commit-notes-vsix
          path: '*.vsix'
          retention-days: 7
